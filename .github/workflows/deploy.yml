name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN needs these to publish a Pages artifact.
permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish; queue at most one more behind it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Trunk
        run: |
          curl -fsSL https://github.com/trunk-rs/trunk/releases/download/v0.21.14/trunk-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xzf - -C /usr/local/bin trunk
          trunk --version

      # Supplies base_path: "/rain-portfolio" for a project site, "" for a
      # user/org site. Requires Pages source = "GitHub Actions" in repo settings.
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      # The site is served from a subdirectory, so asset URLs must carry that
      # prefix. Without --public-url the page would request /style.css and 404.
      - name: Build
        run: trunk build --release --public-url "${{ steps.pages.outputs.base_path }}/"

      # Pages would otherwise run the output through Jekyll, which drops files
      # and directories whose names begin with an underscore.
      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
